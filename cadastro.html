<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Primeiro Acesso | Sistema MS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="glass-card login-container">
        <h2>Primeiro Acesso</h2>
        <p>Crie sua conta de administrador</p>
        <form id="cadastroForm">
            <input type="text" id="nome" placeholder="Seu Nome" required>
            <input type="email" id="email" placeholder="E-mail" required>
            <input type="password" id="password" placeholder="Nova Senha" required>
            <button type="submit" class="btn-primary">Criar Conta</button>
        </form>
        <p><a href="index.html" style="color: white; font-size: 0.8rem; text-decoration: none;">← Voltar ao Login</a></p>
    </div>

    <script type="module" src="js/cadastro.js"></script>
</body>
</html>
