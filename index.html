<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sistema Transpaleteira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="glass-card login-container">
        <div class="logo-placeholder">
            <h2 style="color: #62b6cb; margin-bottom: 5px;">Móveis Simonetti</h2>
            <p style="font-size: 0.8rem; opacity: 0.8;">Gestão de Frota TE25</p>
        </div>
        
        <form id="loginForm" style="margin-top: 20px;">
            <div class="input-group" style="text-align: left;">
                <label style="font-size: 0.8rem; margin-left: 5px;">E-mail Corporativo</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            <div class="input-group" style="text-align: left; margin-top: 10px;">
                <label style="font-size: 0.8rem; margin-left: 5px;">Senha</label>
                <input type="password" id="password" placeholder="******" required>
            </div>
            <button type="submit" class="btn-primary" style="margin-top: 20px;">Entrar no Sistema</button>
        </form>

        <div id="error-message" style="color: #ff4d4d; font-size: 0.8rem; margin-top: 15px; min-height: 20px;"></div>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
        
        <p style="font-size: 0.85rem;">
            Primeiro acesso? 
            <a href="cadastro.html" style="color: #62b6cb; text-decoration: none; font-weight: bold;">
                Cadastre sua senha aqui
            </a>
        </p>
    </div>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
